spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  sql:
    init:
      mode: never
  devtools:
    restart:
      enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    com.test.test: INFO

app:
  datasource:
    host: ${APP_DB_HOST:${MYSQLHOST:localhost}}
    port: ${APP_DB_PORT:${MYSQLPORT:3306}}
    username: ${APP_DB_USERNAME:${MYSQLUSER:}}
    password: ${APP_DB_PASSWORD:${MYSQLPASSWORD:}}
    driver-class-name: org.mariadb.jdbc.Driver
    default-project: ${APP_DB_DEFAULT_PROJECT:default}
    projects:
      default: ${APP_DB_DEFAULT_NAME:${MYSQLDATABASE:app_default_db}}
    hikari:
      maximum-pool-size: ${APP_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${APP_DB_MIN_IDLE:5}
      idle-timeout: ${APP_DB_IDLE_TIMEOUT:300000}
      connection-timeout: ${APP_DB_CONNECTION_TIMEOUT:20000}
  cookie:
    secure: true

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_ANON_KEY}
  bucket: uploads
  enabled: ${SUPABASE_ENABLED:true}

file:
  upload-dir: /app/uploads

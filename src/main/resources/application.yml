server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: total-backend-spring-rest-api
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

dotenv:
  enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration_access: 1800000
  expiration_refresh: 14400000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

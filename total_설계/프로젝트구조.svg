<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="Segoe UI, Malgun Gothic, 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="pf" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 z" fill="#8b94a3"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <text x="40" y="46" font-size="23" font-weight="bold" fill="#1a1e26">total_module 저장소 구조 &amp; 빌드 흐름</text>
  <text x="40" y="73" font-size="13.5" fill="#586475">폴더 하나에서 어떻게 서비스 여러 개가 나오나 — 단일 Dockerfile → 전 모듈 빌드 → 이미지 1개 → APP_MODULE로 실행 모듈 선택</text>

  <!-- ═══ 좌: 폴더 트리 ═══ -->
  <rect x="40" y="95" width="600" height="560" rx="12" fill="#fafbfc" stroke="#e2e6ec" stroke-width="1.5"/>
  <text x="62" y="122" font-size="12.5" font-weight="bold" fill="#5c6675">저장소 폴더 구조</text>

  <g font-family="Consolas, 'D2Coding', 'Courier New', monospace" font-size="13.5">
    <text x="62" y="156" fill="#586475">total_module/            <tspan fill="#8b94a3"># 상위 폴더(실행 코드 없음, 스프링부트 아님)</tspan></text>
    <text x="62" y="182" fill="#586475">├─ Dockerfile            <tspan fill="#8b94a3"># 단일 조립 설계도 · start.sh 내장</tspan></text>
    <text x="62" y="208" fill="#586475">├─ settings.gradle       <tspan fill="#8b94a3"># 모듈 명단 include</tspan></text>
    <text x="62" y="234" fill="#586475">├─ railway.toml          <tspan fill="#8b94a3"># 헬스체크 /healthz</tspan></text>
    <text x="62" y="260" fill="#c8ced8">│</text>

    <text x="62" y="288" fill="#586475">├─ <tspan fill="#4453c6" font-weight="bold">businesscard_qr/</tspan>   <tspan fill="#48505e">[Gradle 모듈]</tspan></text>
    <text x="62" y="310" fill="#8b94a3">│      Spring Boot · 명함 QR API</text>
    <text x="62" y="338" fill="#586475">├─ <tspan fill="#0d8a7b" font-weight="bold">doll_gacha/</tspan>        <tspan fill="#48505e">[Gradle 모듈]</tspan></text>
    <text x="62" y="360" fill="#8b94a3">│      Spring Boot + React(정적 서빙)</text>
    <text x="62" y="388" fill="#586475">├─ project_a/            <tspan fill="#8b94a3"># 향후 모듈…</tspan></text>
    <text x="62" y="414" fill="#c8ced8">│</text>

    <text x="62" y="442" fill="#586475">├─ businesscard_qr_app/  <tspan fill="#9aa1ad">[비-모듈]</tspan></text>
    <text x="62" y="464" fill="#8b94a3">│      Flutter 앱 (APK 별도 배포)</text>
    <text x="62" y="492" fill="#586475">├─ total_설계/           <tspan fill="#9aa1ad">[문서]</tspan></text>
    <text x="62" y="514" fill="#8b94a3">│      아키텍처·편입 / 배포·비용 / 코드컨벤션</text>
    <text x="62" y="542" fill="#586475">└─ 클로드코드와응답/      <tspan fill="#9aa1ad">[기록]</tspan></text>
  </g>

  <text x="62" y="590" font-size="12" fill="#586475"><tspan fill="#48505e" font-weight="bold">[Gradle 모듈]</tspan> = 빌드·서비스 대상 (이미지에 jar 포함)</text>
  <text x="62" y="612" font-size="12" fill="#586475"><tspan fill="#9aa1ad" font-weight="bold">[비-모듈]</tspan> = Flutter·문서 (Docker 이미지에 미포함)</text>

  <!-- ═══ 우: 빌드 → 실행 흐름 ═══ -->
  <rect x="670" y="95" width="490" height="560" rx="12" fill="#fafbfc" stroke="#e2e6ec" stroke-width="1.5"/>
  <text x="692" y="122" font-size="12.5" font-weight="bold" fill="#5c6675">빌드 → 실행 흐름</text>

  <!-- 세로 레일 -->
  <line x1="712" y1="160" x2="712" y2="560" stroke="#e2e6ec" stroke-width="1.5"/>

  <!-- step 1 -->
  <circle cx="712" cy="168" r="14" fill="#ffffff" stroke="#cbd1db" stroke-width="1.5"/>
  <text x="712" y="173" font-size="12" font-weight="bold" fill="#464c60" text-anchor="middle">1</text>
  <text x="742" y="164" font-size="14" font-weight="bold" fill="#1a1e26">Dockerfile (단일, 멀티스테이지)</text>
  <text x="742" y="185" font-size="12.5" fill="#586475">루트 하나로 전 모듈 빌드 · 인프라 설정 한곳 관리</text>

  <!-- step 2 -->
  <circle cx="712" cy="248" r="14" fill="#ffffff" stroke="#cbd1db" stroke-width="1.5"/>
  <text x="712" y="253" font-size="12" font-weight="bold" fill="#464c60" text-anchor="middle">2</text>
  <text x="742" y="244" font-size="14" font-weight="bold" fill="#1a1e26">gradlew :…:bootJar</text>
  <text x="742" y="265" font-size="12.5" fill="#586475">모든 모듈 jar 빌드 → <tspan fill="#4453c6" font-weight="bold">businesscard_qr.jar</tspan>, <tspan fill="#0d8a7b" font-weight="bold">doll_gacha.jar</tspan></text>

  <!-- step 3 -->
  <circle cx="712" cy="328" r="14" fill="#ffffff" stroke="#cbd1db" stroke-width="1.5"/>
  <text x="712" y="333" font-size="12" font-weight="bold" fill="#464c60" text-anchor="middle">3</text>
  <text x="742" y="324" font-size="14" font-weight="bold" fill="#1a1e26">이미지 1개 (모든 jar 포함)</text>
  <text x="742" y="345" font-size="12.5" fill="#586475">서비스마다 같은 이미지를 쓴다</text>

  <!-- step 4 -->
  <circle cx="712" cy="408" r="14" fill="#ffffff" stroke="#cbd1db" stroke-width="1.5"/>
  <text x="712" y="413" font-size="12" font-weight="bold" fill="#464c60" text-anchor="middle">4</text>
  <text x="742" y="404" font-size="14" font-weight="bold" fill="#1a1e26">start.sh — APP_MODULE로 선택</text>
  <text x="742" y="425" font-size="12.5" fill="#586475">java -jar $APP_MODULE.jar · JVM 힙 -Xmx384m 기본</text>

  <!-- step ▶ -->
  <circle cx="712" cy="500" r="14" fill="#464c60" stroke="#464c60" stroke-width="1.5"/>
  <text x="712" y="505" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">▶</text>
  <text x="742" y="490" font-size="14" font-weight="bold" fill="#1a1e26">서비스마다 다른 APP_MODULE</text>
  <text x="742" y="511" font-size="12.5" fill="#586475"><tspan fill="#4453c6" font-weight="bold">businesscard_qr</tspan> 서비스 · <tspan fill="#0d8a7b" font-weight="bold">doll_gacha</tspan> 서비스</text>
  <text x="742" y="530" font-size="12" fill="#8b94a3">같은 이미지, 다른 역할 — 모듈이 늘면 서비스만 + Add</text>

  <text x="692" y="600" font-size="11.5" fill="#586475">각 서비스는 Networking → Generate Domain 으로 자기 공개 URL을 갖고,</text>
  <text x="692" y="620" font-size="11.5" fill="#586475">DB는 공통 total_mysql(스키마 분리), 파일은 모듈별 버킷을 쓴다. (→ 서버아키텍처.svg)</text>
</svg>

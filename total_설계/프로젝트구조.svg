<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="800" viewBox="0 0 1320 800" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#444"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#b8860b"/>
    </marker>
  </defs>

  <rect width="1320" height="800" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="40" y="44" font-size="23" font-weight="bold" fill="#1a1a2e">total_module 프로젝트 구조 — 스프링부트가 아니라 "Gradle 멀티모듈 루트 + 배포 껍데기"</text>
  <text x="40" y="70" font-size="13.5" fill="#666">total_module 자체에는 실행 코드가 없다. ① 소속 모듈 선언 ② 공통 빌드 설정 ③ 배포 껍데기 — 이 세 가지가 전부. (2026-07-08: 게이트웨이 모듈 삭제됨)</text>

  <!-- ═══ total_module 컨테이너 ═══ -->
  <rect x="50" y="95" width="800" height="660" rx="12" fill="#fafafa" stroke="#555" stroke-width="2"/>
  <text x="72" y="126" font-size="16" font-weight="bold" fill="#1a1a2e">📁 total_module/</text>
  <text x="250" y="126" font-size="12.5" fill="#888">— src/ 없음, main 클래스 없음 = 스프링부트 프로젝트 아님</text>

  <!-- 루트 역할 파일들 -->
  <rect x="80" y="145" width="230" height="86" rx="8" fill="#fff8e6" stroke="#b8860b" stroke-width="1.8"/>
  <text x="195" y="169" font-size="13.5" font-weight="bold" fill="#7a5a00" text-anchor="middle">① settings.gradle</text>
  <text x="195" y="192" font-size="11.5" fill="#555" text-anchor="middle">include 'businesscard_qr'</text>
  <text x="195" y="214" font-size="11" fill="#888" text-anchor="middle">(새 모듈마다 한 줄 추가)</text>

  <rect x="335" y="145" width="230" height="86" rx="8" fill="#fff8e6" stroke="#b8860b" stroke-width="1.8"/>
  <text x="450" y="169" font-size="13.5" font-weight="bold" fill="#7a5a00" text-anchor="middle">② build.gradle + gradlew</text>
  <text x="450" y="192" font-size="11.5" fill="#555" text-anchor="middle">공통 설정 (거의 비어있음)</text>
  <text x="450" y="211" font-size="11.5" fill="#555" text-anchor="middle">저장소 지정, bootJarAll</text>

  <rect x="590" y="145" width="235" height="86" rx="8" fill="#fff8e6" stroke="#b8860b" stroke-width="1.8"/>
  <text x="707" y="169" font-size="13.5" font-weight="bold" fill="#7a5a00" text-anchor="middle">③ Dockerfile + railway.toml</text>
  <text x="707" y="192" font-size="11.5" fill="#555" text-anchor="middle">모든 모듈 jar를 이미지 하나에 담고</text>
  <text x="707" y="211" font-size="11.5" fill="#555" text-anchor="middle">APP_MODULE로 실행 jar 선택</text>

  <!-- include 화살표 -->
  <line x1="180" y1="231" x2="230" y2="315" stroke="#b8860b" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="230" y1="228" x2="480" y2="318" stroke="#b8860b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrG)"/>
  <text x="120" y="285" font-size="12" font-weight="bold" fill="#b8860b">include (Gradle 서브프로젝트로 등록)</text>

  <!-- Dockerfile → 모듈 화살표 -->
  <line x1="740" y1="231" x2="360" y2="330" stroke="#444" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="620" y="290" font-size="11.5" fill="#666">jar 빌드해서 포장</text>

  <!-- ═══ 스프링부트 모듈 ═══ -->
  <rect x="80" y="320" width="360" height="150" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="2.2"/>
  <text x="100" y="348" font-size="15" font-weight="bold" fill="#1a1a2e">📁 businesscard_qr/</text>
  <text x="100" y="371" font-size="12.5" fill="#2e7d32" font-weight="bold">독립 실행 가능한 스프링부트 앱 (명함 API)</text>
  <text x="100" y="392" font-size="12" fill="#555">· 자기 main 클래스 + 자기 jar</text>
  <text x="100" y="411" font-size="12" fill="#555">· 자체 gradlew·settings.gradle도 있음 (원래 별도</text>
  <text x="110" y="429" font-size="12" fill="#555">프로젝트였던 흔적 → IDE에서 단독으로도 열림)</text>
  <text x="100" y="452" font-size="11.5" fill="#888">루트에서 빌드 시엔 루트 settings.gradle이 기준</text>

  <rect x="465" y="320" width="360" height="150" rx="10" fill="#fafafa" stroke="#999" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="485" y="348" font-size="15" font-weight="bold" fill="#888">📁 project_a/ (향후)</text>
  <text x="485" y="371" font-size="12.5" fill="#888" font-weight="bold">로컬에서 완성한 프로젝트를 폴더째 투하</text>
  <text x="485" y="392" font-size="12" fill="#aaa">· include 한 줄 + Dockerfile 3곳 + start.sh 목록</text>
  <text x="485" y="411" font-size="12" fill="#aaa">· 배포 적합화(env·PORT·healthz)만 하면 끝</text>
  <text x="485" y="452" font-size="11.5" fill="#888">"독립 앱이면서 모듈" — businesscard_qr과 동일 지위</text>

  <!-- ═══ Flutter 앱 ═══ -->
  <rect x="80" y="500" width="500" height="120" rx="10" fill="#eef4ff" stroke="#2b5cad" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="100" y="528" font-size="15" font-weight="bold" fill="#1a1a2e">📁 businesscard_qr_app/</text>
  <text x="100" y="551" font-size="12.5" fill="#2b5cad" font-weight="bold">완전 별개의 Flutter(Dart) 프로젝트 — Gradle 멤버 아님</text>
  <text x="100" y="572" font-size="12" fill="#555">· settings.gradle에 include 안 됨 · Dockerfile에도 안 들어감</text>
  <text x="100" y="591" font-size="12" fill="#555">· 클로드코드가 서버·앱을 같이 보고 수정할 수 있게 한 폴더에 둔 것</text>
  <text x="100" y="610" font-size="12" fill="#555">· 배포는 APK/스토어로 별도 (서버 배포와 무관)</text>

  <!-- 제외 표시 -->
  <line x1="195" y1="231" x2="150" y2="497" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="120" y="380" font-size="16" font-weight="bold" fill="#c0392b">✕</text>
  <text x="88" y="488" font-size="11.5" fill="#c0392b">include 대상 아님</text>

  <!-- 문서 폴더 -->
  <rect x="610" y="500" width="215" height="120" rx="10" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="630" y="528" font-size="14" font-weight="bold" fill="#555">📁 문서 폴더들</text>
  <text x="630" y="552" font-size="12" fill="#666">· total_설계/ (전체 기준 문서)</text>
  <text x="630" y="571" font-size="12" fill="#666">· 클로드코드와응답/ (작업 기록)</text>
  <text x="630" y="590" font-size="12" fill="#666">· 클로드코드참고용/ (참고사항)</text>
  <text x="630" y="612" font-size="11.5" fill="#999">빌드·배포와 무관</text>

  <!-- 하단 요약 -->
  <rect x="80" y="645" width="745" height="92" rx="10" fill="#fffbe6" stroke="#d4a017" stroke-width="1.5"/>
  <text x="100" y="673" font-size="13.5" font-weight="bold" fill="#7a5a00">한 줄 요약</text>
  <text x="100" y="697" font-size="12.5" fill="#333">total_module = 실행 코드 없는 <tspan font-weight="bold">상위 폴더(멀티모듈 루트)</tspan>. 스프링부트 모듈들은 <tspan font-weight="bold">각자 독립 앱이면서 Gradle 모듈</tspan>,</text>
  <text x="100" y="718" font-size="12.5" fill="#333">Flutter 앱은 <tspan font-weight="bold">소속 없이 얹혀 있는 별개 프로젝트</tspan>. 배포 시엔 루트 Dockerfile이 모듈 jar들만 포장한다.</text>

  <!-- ═══ 우측 패널 ═══ -->
  <rect x="880" y="95" width="400" height="290" rx="10" fill="#eef4ff" stroke="#2b5cad" stroke-width="1.5"/>
  <text x="900" y="125" font-size="15" font-weight="bold" fill="#2b5cad">프로젝트 A를 가져올 때 (6단계)</text>
  <text x="900" y="153" font-size="13" fill="#333">① A 폴더를 total_module 바로 밑에 놓기</text>
  <text x="900" y="180" font-size="13" fill="#333">② 루트 settings.gradle에 한 줄 추가:</text>
  <text x="920" y="201" font-size="12.5" fill="#555" font-family="Consolas, monospace">include 'project_a'</text>
  <text x="900" y="228" font-size="13" fill="#333">③ Dockerfile의 [새 모듈 추가 시] 주석 3곳 반영</text>
  <text x="900" y="255" font-size="13" fill="#333">④ start.sh의 APP_MODULE 허용 목록에 추가</text>
  <text x="900" y="282" font-size="13" fill="#333">⑤ Railway 서비스 생성 (APP_MODULE=project_a)</text>
  <text x="900" y="309" font-size="13" fill="#333">⑥ Generate Domain → 클라이언트가 그 도메인 사용</text>
  <text x="900" y="340" font-size="12" fill="#c0392b">※ 게이트웨이 라우팅 단계는 없음 (은퇴됨)</text>
  <text x="900" y="362" font-size="12" fill="#666">※ A의 클라이언트(앱/웹)는 include 없이 폴더만 두면 됨</text>

  <rect x="880" y="415" width="400" height="220" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="900" y="445" font-size="15" font-weight="bold" fill="#2e7d32">빌드가 두 가지로 되는 이유</text>
  <text x="900" y="475" font-size="13" font-weight="bold" fill="#333">루트에서 (배포 경로):</text>
  <text x="920" y="496" font-size="12" fill="#555" font-family="Consolas, monospace">gradlew :businesscard_qr:bootJar</text>
  <text x="920" y="516" font-size="12" fill="#666">→ 루트 settings.gradle 기준, 모듈로 취급</text>
  <text x="900" y="546" font-size="13" font-weight="bold" fill="#333">모듈 폴더에서 (개발 편의):</text>
  <text x="920" y="567" font-size="12" fill="#555" font-family="Consolas, monospace">cd businesscard_qr; gradlew bootRun</text>
  <text x="920" y="587" font-size="12" fill="#666">→ 자기 settings.gradle 기준, 독립 프로젝트</text>
  <text x="900" y="617" font-size="12" fill="#888">둘 다 되는 건 모듈 안에 wrapper·settings가 남아 있어서</text>

  <rect x="880" y="665" width="400" height="100" rx="10" fill="#fff5f5" stroke="#c0392b" stroke-width="1.5"/>
  <text x="900" y="695" font-size="14" font-weight="bold" fill="#c0392b">헷갈리기 쉬운 것</text>
  <text x="900" y="721" font-size="12.5" fill="#333">"통합"은 저장소·이미지 차원이고, <tspan font-weight="bold">jar은 안 합쳐짐</tspan> —</text>
  <text x="900" y="741" font-size="12.5" fill="#333">이미지 1개에 jar N개, Railway 서비스가 모듈마다 1개씩 실행</text>
</svg>

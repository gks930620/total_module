  <text x="197" y="189" font-size="12" fill="#586475" text-anchor="middle">businesscard_qr_app · APK 별도</text>

  <rect x="335" y="142" width="255" height="62" rx="8" fill="#ffffff" stroke="#0d8a7b" stroke-width="1.8"/>
  <text x="462" y="168" font-size="14" font-weight="bold" fill="#1a1e26" text-anchor="middle">브라우저 (인형뽑기 화면)</text>
  <text x="462" y="189" font-size="12" fill="#586475" text-anchor="middle">doll_gacha React (스프링부트가 서빙)</text>

  <rect x="610" y="142" width="230" height="62" rx="8" fill="#fafafa" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="6 4"/>

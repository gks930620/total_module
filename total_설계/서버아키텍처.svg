  <rect x="655" y="583" width="170" height="52" rx="9" fill="#e6f5f2" stroke="#0d8a7b" stroke-width="1.8"/>
  <text x="740" y="606" font-size="12.5" font-weight="bold" fill="#0d8a7b" text-anchor="middle">doll_gacha_bucket</text>
  <text x="740" y="624" font-size="10.5" fill="#586475" text-anchor="middle">S3 · private</text>
  <text x="647" y="666" font-size="10.5" fill="#8b94a3" text-anchor="middle">버킷은 모듈별 (용량 과금이라 개수 무관)</text>

  <!-- 하단 노트 -->
  <text x="75" y="720" font-size="12.5" font-weight="bold" fill="#c0392b">✗ dist_api_gateway (리버스 프록시) — 2026-07-08 은퇴·삭제 완료</text>
  <text x="75" y="740" font-size="11.5" fill="#8a7a6a">초기 "서버 1대로 합쳐 배포" 설계의 유산. 모듈별 서비스 분리로 존재 이유가 사라져 제거(필요 시 git에서 부활).</text>
  <text x="75" y="766" font-size="11.5" fill="#5a3ba6">※ 서비스들은 같은 저장소·같은 Docker 이미지를 쓰고 APP_MODULE로 역할만 다르게 실행.</text>
  <text x="75" y="786" font-size="11.5" fill="#5a3ba6">※ DB는 인스턴스 1개(스키마 분리) / 버킷은 모듈별. App Sleeping + Hard limit $5로 비용 관리.</text>

  <!-- ═══ 우측 패널 ═══ -->
  <!-- 배포 방식 -->
  <rect x="890" y="100" width="410" height="210" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="910" y="127" font-size="14.5" font-weight="bold" fill="#2e7d32">배포 방식: 한 저장소 → 여러 서비스</text>
  <text x="910" y="153" font-size="12.5" fill="#333">· GitHub 저장소 1개 (total_module)</text>
  <text x="910" y="175" font-size="12.5" fill="#333">· 루트 단일 Dockerfile → 이미지 1개(모든 모듈 jar)</text>
  <text x="910" y="197" font-size="12.5" fill="#333">· 서비스마다 APP_MODULE로 실행할 jar 선택</text>
  <text x="910" y="219" font-size="12.5" fill="#333">· 헬스체크 GET /healthz (모든 모듈)</text>
  <text x="910" y="241" font-size="12.5" fill="#333">· master push → 저장소 보는 서비스들 재배포</text>
  <text x="910" y="263" font-size="12.5" fill="#333">· Generate Domain으로 자기 공개 URL</text>
  <text x="910" y="289" font-size="12.5" font-weight="bold" fill="#c0392b">⚠ jar 하나로 안 합침 — 모듈 = 서비스 1:1</text>

  <!-- 비용 최적화 -->
  <rect x="890" y="330" width="410" height="215" rx="10" fill="#fdf5ec" stroke="#b26a2e" stroke-width="1.5"/>
  <text x="910" y="357" font-size="14.5" font-weight="bold" fill="#b26a2e">비용 최적화 (2026-07 결정)</text>
  <text x="910" y="383" font-size="12.5" fill="#333">· JVM은 트래픽 0에도 RAM 상시 점유 → 앱 1개 ≈ $5</text>
  <text x="910" y="405" font-size="12.5" fill="#333">· App Sleeping: idle 시 재움 (첫 요청 콜드스타트)</text>
  <text x="910" y="427" font-size="12.5" fill="#333">· JVM 힙 -Xmx384m 기본 (Dockerfile start.sh)</text>
  <text x="910" y="449" font-size="12.5" fill="#333">· DB 공통 1개 + 스키마 분리 → DB비 N→1</text>
  <text x="910" y="471" font-size="12.5" fill="#333">· 버킷은 모듈별 (용량 과금이라 개수 무관)</text>
  <text x="910" y="493" font-size="12.5" fill="#333">· Hard limit $5 → 초과 시 자동 정지</text>
  <text x="910" y="521" font-size="11.5" fill="#8a7a6a">모놀리스 병합은 난이도 커서 회피 (트래픽 커지면 재검토)</text>

  <!-- 편입 절차 -->
  <rect x="890" y="565" width="410" height="245" rx="10" fill="#eef4ff" stroke="#2b5cad" stroke-width="1.5"/>
  <text x="910" y="592" font-size="14.5" font-weight="bold" fill="#2b5cad">새 모듈 편입 절차</text>
  <text x="910" y="618" font-size="12.5" fill="#333">① 로컬에서 완성한 모듈 폴더를 루트에 투하</text>
  <text x="910" y="640" font-size="12.5" fill="#333">② settings.gradle 에 include 추가</text>
  <text x="910" y="662" font-size="12.5" fill="#333">③ Dockerfile 3곳 + start.sh APP_MODULE 목록</text>
  <text x="910" y="684" font-size="12.5" fill="#333">④ 배포 적합화: env 주입 · PORT · /healthz · 버킷</text>
  <text x="910" y="706" font-size="12.5" fill="#333">⑤ Railway 서비스 생성 + APP_MODULE + Generate Domain</text>
  <text x="910" y="728" font-size="12.5" fill="#333">⑥ 공통 MySQL에 database 생성 + 버킷 생성</text>

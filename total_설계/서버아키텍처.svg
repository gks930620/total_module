  <rect x="75" y="345" width="235" height="122" rx="10" fill="#ffffff" stroke="#4453c6" stroke-width="2.5"/>
  <text x="192" y="373" font-size="15" font-weight="bold" fill="#4453c6" text-anchor="middle">businesscard_qr</text>
  <text x="192" y="394" font-size="12" fill="#586475" text-anchor="middle">명함 QR API (Spring Boot)</text>
  <text x="192" y="412" font-size="12" fill="#586475" text-anchor="middle">카카오→JWT · CRUD · vCard</text>
  <text x="192" y="432" font-size="11.5" font-weight="bold" fill="#4453c6" text-anchor="middle">APP_MODULE=businesscard_qr</text>
  <text x="192" y="452" font-size="11" fill="#8b94a3" text-anchor="middle">App Sleeping · /healthz · /swagger</text>

  <rect x="330" y="345" width="235" height="122" rx="10" fill="#ffffff" stroke="#0d8a7b" stroke-width="2.5"/>
  <text x="447" y="373" font-size="15" font-weight="bold" fill="#0d8a7b" text-anchor="middle">doll_gacha</text>
  <text x="447" y="394" font-size="12" fill="#586475" text-anchor="middle">인형뽑기 (Spring Boot + React)</text>
  <text x="447" y="412" font-size="12" fill="#586475" text-anchor="middle">OAuth2 카카오·구글 · 정적 서빙</text>
  <text x="447" y="432" font-size="11.5" font-weight="bold" fill="#0d8a7b" text-anchor="middle">APP_MODULE=doll_gacha</text>
  <text x="447" y="452" font-size="11" fill="#8b94a3" text-anchor="middle">App Sleeping · /healthz</text>

  <rect x="585" y="345" width="240" height="122" rx="10" fill="#fafafa" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="705" y="379" font-size="15" font-weight="bold" fill="#9aa1ad" text-anchor="middle">프로젝트 A (향후)</text>
  <text x="705" y="403" font-size="12" fill="#aeb4bf" text-anchor="middle">로컬 완성 후 모듈로 편입</text>
  <text x="705" y="425" font-size="11.5" fill="#aeb4bf" text-anchor="middle">APP_MODULE=project_a</text>
  <text x="705" y="447" font-size="11" fill="#c2c7d0" text-anchor="middle">편입 시 DB스키마·버킷 추가</text>

  <!-- 서비스 → 데이터 -->
  <line x1="192" y1="467" x2="192" y2="540" stroke="#4453c6" stroke-width="2" marker-end="url(#arA)"/>
  <line x1="447" y1="467" x2="447" y2="540" stroke="#0d8a7b" stroke-width="2" marker-end="url(#arB)"/>
  <text x="205" y="508" font-size="10.5" fill="#4453c6">schema+버킷</text>
  <text x="460" y="508" font-size="10.5" fill="#0d8a7b">schema+버킷</text>


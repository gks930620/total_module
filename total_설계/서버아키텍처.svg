  <rect x="0" y="0" width="1340" height="900" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#1a1e26">total_module 서버 아키텍처 — 모듈 = Railway 서비스, 각자 자기 URL 직행</text>
  <text x="40" y="74" font-size="13.5" fill="#586475">저장소 1개 = Railway 프로젝트 1개 · 루트 단일 Dockerfile · 게이트웨이 없음 · DB는 공통 MySQL(스키마 분리) · 파일은 모듈별 버킷(S3)</text>

  <!-- ═══ 클라이언트 ═══ -->
  <rect x="50" y="100" width="800" height="120" rx="10" fill="#eef4ff" stroke="#7aa2e8" stroke-width="1.5"/>
  <text x="70" y="126" font-size="14" font-weight="bold" fill="#2b5cad">클라이언트 (서버 배포와 무관 — 각자 자기 모듈 서비스만 바라봄)</text>

  <rect x="80" y="142" width="235" height="62" rx="8" fill="#ffffff" stroke="#4453c6" stroke-width="1.8"/>

  <rect x="75" y="540" width="765" height="150" rx="10" fill="#fbfcff" stroke="#d5d9e4" stroke-width="1.2"/>
  <text x="92" y="562" font-size="12.5" font-weight="bold" fill="#5c6675">데이터 — 공통 MySQL 1개(스키마로 모듈 분리) + 모듈별 버킷(S3)</text>

  <!-- MySQL 실린더 -->
  <path d="M100,600 v52 a70,11 0 0 0 140,0 v-52" fill="#fff8e6" stroke="#b8860b" stroke-width="2"/>
  <ellipse cx="170" cy="600" rx="70" ry="11" fill="#fff3cc" stroke="#b8860b" stroke-width="2"/>

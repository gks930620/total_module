# =========================================================
# 테스트 전용 설정 - H2 인메모리 (외부 DB 불필요, 자립 실행)
# =========================================================
spring:
  datasource:
    url: jdbc:h2:mem:doll_gacha_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # 테스트 시작 시 생성, 종료 시 삭제
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  sql:
    init:
      mode: always
      data-locations:
        - classpath:data-users.sql
        - classpath:data-dollshop.sql
        - classpath:data-files.sql
        - classpath:data-review.sql

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-id
            client-secret: test-kakao-secret
            client-authentication-method: client_secret_post
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
          google:
            client-id: test-google-id
            client-secret: test-google-secret
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: testSecretKeyShouldBeLongEnoughToSatisfyRequirements1234567890
  expiration_access: 1800000
  expiration_refresh: 14400000

app:
  cookie:
    secure: false
  # 버킷 endpoint 미설정 → 파일 저장은 로컬 디스크 폴백 사용 (테스트에서 네트워크/S3 불필요)
  bucket:
    endpoint:

# 테스트 업로드 파일은 build 하위에 격리 (커밋/작업 트리 오염 방지)
file:
  upload-dir: ./build/test-uploads

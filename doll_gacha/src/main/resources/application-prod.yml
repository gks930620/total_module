# =========================================================
# 배포(운영) 설정 - Railway MySQL
#  활성화: SPRING_PROFILES_ACTIVE=prod
#  SPRING_DATASOURCE_* 환경변수를 그대로 사용한다.
#
#  [비용] MySQL 서비스는 프로젝트 공통 1개(total_mysql)를 쓰고,
#         모듈별로 database(스키마)만 분리한다. 이 모듈의 database = `doll_gacha`.
#         → SPRING_DATASOURCE_URL 의 .../doll_gacha 부분이 그 스키마.
#         (스키마 분리라 businesscard 등 다른 모듈과 테이블이 안 겹침)
#         상세: total_설계/railway_배포_및_비용.md
#  [메모리] JVM 힙 상한은 Dockerfile start.sh 의 JAVA_OPTS(-Xmx384m)로 공통 적용.
# =========================================================
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:doll_gacha}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  sql:
    init:
      mode: never   # 운영에서 시드 SQL 비활성화

  devtools:
    livereload:
      enabled: false
    restart:
      enabled: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    com.doll.gacha: INFO

# 쿠키 보안 설정 (운영: HTTPS 이므로 true)
app:
  cookie:
    secure: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

# (파일 저장: Railway Storage Bucket(S3). BUCKET_ENDPOINT/BUCKET_ACCESS_KEY_ID/
#  BUCKET_SECRET_ACCESS_KEY/BUCKET_NAME 환경변수로 주입 — app.bucket 은 base application.yml 에 정의)

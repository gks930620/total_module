server:
  port: ${SERVER_PORT:${PORT:8081}}
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:businesscard;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
        show_sql: ${SPRING_JPA_SHOW_SQL:true}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL_LEVEL:debug}
    org.hibernate.orm.jdbc.bind: ${LOG_BIND_LEVEL:trace}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-secret-key-change-this-before-production-1234567890}
    access-token-validity-seconds: ${APP_JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}
  kakao:
    user-info-uri: ${APP_KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}

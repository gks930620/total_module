server:
  port: ${SERVER_PORT:${PORT:8081}}
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:businesscard;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    # 기본값을 비워두면 Spring Boot가 JDBC URL로 드라이버를 자동 추론한다(로컬 H2, 운영 MariaDB 모두 동작).
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
        show_sql: ${SPRING_JPA_SHOW_SQL:false}
  h2:
    console:
      # 운영 노출 방지를 위해 기본 비활성화. 로컬에서 필요하면 SPRING_H2_CONSOLE_ENABLED=true.
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # 기본은 조용하게. SQL/바인딩 파라미터(개인정보 포함 가능) 노출을 피한다.
    org.hibernate.SQL: ${LOG_SQL_LEVEL:warn}
    org.hibernate.orm.jdbc.bind: ${LOG_BIND_LEVEL:warn}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

app:
  # QR/이미지 등 절대 URL 생성 시 사용할 공개 베이스 URL(예: https://gateway.example.com).
  # 비워두면 X-Forwarded 헤더 기반(fromCurrentContextPath)으로 추론한다.
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  bucket:
    # endpoint가 비어있지 않으면 S3 호환 오브젝트 스토리지(Railway Buckets)에 저장(운영, 재배포에도 보존).
    # 비어있으면 로컬 디스크(file.upload-dir)로 폴백한다(개발 편의용).
    endpoint: ${BUCKET_ENDPOINT:}
    access-key: ${BUCKET_ACCESS_KEY_ID:}
    secret-key: ${BUCKET_SECRET_ACCESS_KEY:}
    name: ${BUCKET_NAME:}
    region: ${BUCKET_REGION:us-east-1}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-secret-key-change-this-before-production-1234567890}
    access-token-validity-seconds: ${APP_JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}
    refresh-token-validity-seconds: ${APP_JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
  kakao:
    user-info-uri: ${APP_KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    # 발급 앱 검증용(선택). 비워두면 검증을 건너뛴다.
    expected-app-id: ${APP_KAKAO_EXPECTED_APP_ID:}
    token-info-uri: ${APP_KAKAO_TOKEN_INFO_URI:https://kapi.kakao.com/v1/user/access_token_info}
